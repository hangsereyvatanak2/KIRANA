<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .parent-container {
        display: flex;
        width: 100%;
        height: 100vh;
        justify-content: center;
        align-items: center;
    }

    .container{
        display: flex;
        box-shadow: rgba(0, 0, 0, 0.3) 0px 19px 38px, rgba(0, 0, 0, 0.22) 0px 15px 12px;
        background-color: white;
        width: 1000px;
        height: 700px;
    }

    .container>.image{
        align-items: center;
        justify-content: center;
        display: flex;
        width: 50%;
        height: 100%;
        background-position: center;
        background-size: cover;
        background-image: url('https://i.pinimg.com/736x/8f/31/ea/8f31ea9d30b7e508e27d66e0f009a589.jpg');
    }
    .text{
        color: aliceblue;
        align-items: center;
        display: flex;
        text-align: center;
    }
    .form{
        width: 50%;
        height: 100%  
        gap: 10px;
        padding: 20px;
        
    }

</style>

<body>
    <div class="parent-container">
        <div class="container">

            <div class="image">
                <h1 class="text">Welcome <br>Back!</h1>
            </div>

            <div class="form">
                <h1>Login</h1>
                <p>Welcome Back please enter Your Account</p>
                <label for="">User name</label><br> 
                <input   type="text"><br>
                <label for="">Enter Password</label><br> 
                <input   type="text"><br>
            </div>

        </div>
    </div>

</body>

</html>
