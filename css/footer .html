<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        margin: 0px;
    }

    body {
        display: flex;
        width: 100%;
        height: 100vh;
        justify-content: center;
        align-items: center;
    }

    .container {
        display: flex;
        background-color: rgb(153, 148, 148);
        justify-content: space-between;
        text-align: start;
        width: 1000px;
        height: auto;
        padding: 100px;
    }

    .top {
        width: 100%;
        height: auto;
        display: flex;
        justify-content: space-between;
        border-radius: 15px;

    }

    .second {
        font-size: 30px;
    }

    .hello1 {
        display: flex;
        background-color: red;
        border-radius: 50px;
        width: 350px;
        height: 50px;
        outline: none;
    }
    .hello1>input{
         background-color: transparent;
         border: none;
         outline: none;
    }

    .btn {
        background-color: green;
        border-radius: 50px;
        width: 100px;
        height: 35px;
        border: none;
    }
</style>

<body>

    <div>
        <footer class="container">
            <div class="top">
                <div class="second"> Sip Your Way To Wellness - <br>One Cup At A Time</div>
                <div class="hello">
                    <p>Get In Touch</p>
                    <div class="hello1">
                        <input type="text">
                        <button class="btn">SUBSCRIBE</button>
                    </div>
                </div>
            </div>

        </footer>
    </div>

</body>

</html>
