<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        
    }

    .container{
        width: 100%;
        height: 100vh;
        display: grid ;
        background-color: rgb(97, 181, 255);
        grid-template-columns: repeat(4,1fr);
        grid-template-rows:2fr repeat(4,1fr);
        gap: 10px;
        padding: 20px;
    }
    .box{
        background-color: red;
        color: rgb(255, 255, 255);
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 50px;
        border-radius: 15px;
    }
    .box:nth-child(1){
        grid-column: span 4;
        overflow: hidden;
    }
    .box:nth-child(1) img{
        width: 100%;
        height: 100%;
        border-radius: 15px;
        object-fit: contain;
        
    }
    
    .box:nth-child(2){
        grid-row: span 3;
    }
        .box:nth-child(2) img{
        width: 100%;
        height: 100%;
        border-radius: 15px;
        object-fit: contain;
    }
    .box:nth-child(3){
        grid-column: span 3;
        grid-row: span 2;
    }
        .box:nth-child(3) img{
        width: 100%;
        height: 100%;
        border-radius: 15px;
        object-fit: contain;
    }

    .box:nth-child(4){
        grid-column: span 3;
        overflow: hidden;
        
    }
            .box:nth-child(4) img{
        width: 100%;
        height: 100%;
        border-radius: 15px;
        object-fit: contain;
    }
    .box:nth-child(5){
        grid-column: span 4;
        overflow: hidden;
        
    }
        .box:nth-child(5) img{
        width: 100%;
        height: 100%;
        border-radius: 15px;
        object-fit: contain;

        
    }

</style>
<body>

    <div class="container">
        <box class="box"><img src="https://i.pinimg.com/vwebp/736x/51/42/b5/5142b5c81eb55c1eb775e8f860aea99a.webp" alt=""></box>
        <box class="box"><img src="https://i.pinimg.com/vwebp/736x/a0/7a/ee/a07aeecc0c6042c4a877ba34ac90bea2.webp" alt=""></box>
        <box class="box"><img src="https://i.pinimg.com/736x/22/32/a5/2232a5f846cb570b5e54b934e4170a85.jpg" alt=""></box>
        <box class="box"><img src="https://i.pinimg.com/736x/5a/99/92/5a9992ba8233deb306db42ebaa1a7a78.jpg" alt=""></box>
        <box class="box"><img src="https://i.pinimg.com/736x/65/22/4b/65224b59be508618a6a07a54697e3b99.jpg" alt=""></box>
    </div>
    
</body>
</html>
