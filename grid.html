<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        margin: 0;
        box-sizing: border-box;
        --bg:rgb(105, 128, 12);
    }
    .container{
        width: 100%;
        height: 100vh;
        display: grid;
        grid-template-columns: repeat(4,300px);
        grid-template-rows: repeat(3,200px);
        background-color: rgb(29, 225, 225);
        justify-content: center;
        gap: 10px;
        padding: 10px;
        align-content: center;

        grid-template-areas: "A B B D"
                             "A B B D"
                             " I J K L";
    }
    .box{
        background-color: var(--bg);
        display: flex;
        justify-content: center;
        align-items: center;
        color: aliceblue;
        font-size: 50px;
        border-radius: 20px;
    }
    .box:nth-child(4){
        grid-area: D;
    }
        .box:nth-child(1){
        grid-area: A;
    }
        .box:nth-child(2){
        grid-area: B;
    }

    
</style>
<body>

    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
        <div class="box">7</div>

    </div>
    
</body>
</html>
