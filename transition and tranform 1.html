<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .container{
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }
    button{
        background-color: rgb(5, 125, 85);
        padding: 30px;
        border-radius: 20px;
        border: none;
        color: aliceblue;
        transition: 1s ease;    
    }
    button:hover{
        background-color:  rgb(35, 192, 155);
        transform: rotate(360deg);
        transition:1s ease;
        padding: 20px;
    }  
     

</style>
<body>

    <div class="container">
        <button>click me</button>
    </div>
    
</body>
</html>
