<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        margin: 0;
    }
    .container{
       display: flex;
       width: 100%;
       background-color: aquamarine;
       height: 100vh;
       gap: 10px;

    }
    .box{
        width: 200px;
        height: 200px;
        background-color: brown;
        animation: translate_left_right 4s infinite alternate;
    }
    @keyframes translate_left_right {
        0%{
            transform: translateX(0px) rotate(0deg);
        }
        50%{
            transform: translateX(300px) rotate(180deg);
        }
        100%{
            transform: translate(1000px) rotate(360deg);
        }
    }
</style>
<body>

    <div class="container">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
    
</body>
</html>
